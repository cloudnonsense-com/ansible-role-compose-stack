---
# tasks file for ansible-role-compose-stack
- name: compose_stack | ensure dir exists
  file:
    path: "{{ app_dir }}"
    state: directory
    mode: '0755'

- name: compose_stack | copy compose.yml 
  template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    mode: '0644'

- name: compose_stack | start compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
