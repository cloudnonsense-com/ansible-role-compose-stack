---
# tasks file for ansible-role-compose-stack
- name: compose_stack ({{ compose_stack_name }}) | create app dir
  ansible.builtin.file:
    path: "{{ compose_stack_dst_dir }}"
    state: directory
    mode: '0755'
  when:
    - compose_stack_state == "present"

- name: compose_stack ({{ compose_stack_name }}) | render compose.yml 
  ansible.builtin.template:
    src: "{{ compose_stack_src_file }}"
    dest: "{{ compose_stack_dst_dir }}/compose.yml"
    mode: '0644'
  when:
    - compose_stack_state == "present"
  notify: restart compose stack

- name: compose_stack ({{ compose_stack_name }}) | copy app data"
  ansible.builtin.copy:
    src: "{{ compose_stack_src_data }}/"
    dest: "{{ compose_stack_dst_data }}/"
    owner: "{{ compose_stack_file_owner }}"
    group: "{{ compose_stack_file_owner }}"
    mode: '0644'
    directory_mode: '0744'
  when:
    - compose_stack_state == "present"
    - compose_stack_copy_data
  notify: restart compose stack

- name: compose_stack ({{ compose_stack_name }}) | start compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ compose_stack_dst_dir }}"
    state: present
  when:
    - compose_stack_state == "present"

# compose_stack ABSENT
- name: compose_stack ({{ compose_stack_name }}) | check if app dir exists
  ansible.builtin.stat:
    path: "{{ compose_stack_dst_dir }}"
  when: compose_stack_state == "absent"
  register: compose_stack_dst_dir_stat

- name: compose_stack ({{ compose_stack_name }}) | stop and remove compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ compose_stack_dst_dir }}"
    state: absent
  when: 
    - compose_stack_state == "absent"
    - compose_stack_dst_dir_stat.stat.isdir is defined
    - compose_stack_dst_dir_stat.stat.isdir

- name: compose_stack ({{ compose_stack_name }}) | remove app directory
  ansible.builtin.file:
    path: "{{ compose_stack_dst_dir }}"
    state: absent
  when: compose_stack_state == "absent"
