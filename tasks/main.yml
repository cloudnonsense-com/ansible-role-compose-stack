---
# tasks file for ansible-role-compose-stack
- name: compose_stack ({{app}}) | create app dir
  ansible.builtin.file:
    path: "{{ app_dst_dir }}"
    state: directory
    mode: '0755'
  when:
    - app_state == "present"

- name: compose_stack ({{app}}) | copy compose.yml 
  ansible.builtin.template:
    src: "{{ compose_src_file }}"
    dest: "{{ app_dst_dir }}/compose.yml"
    mode: '0644'
  when:
    - app_state == "present"

