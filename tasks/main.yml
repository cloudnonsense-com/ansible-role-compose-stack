- name: compose_stack ({{app}}) | copy app data"
  ansible.builtin.copy:
    src: "{{ src_app_data }}/"
    dest: "{{ dst_app_data }}/"
    owner: "{{ app_file_owner }}"
    group: "{{ app_file_owner }}"
    mode: '0644'
  when:
    - app_state == "present"
    - app_copy_data

- name: compose_stack ({{app}}) | start compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_dst_dir }}"
    state: present
  when:
    - app_state == "present"
