---
# create.yml
- name: "compose_stack ({{ compose_stack_name }}) | create app dir"
  ansible.builtin.file:
    path:  "{{ compose_stack_dst_dir }}"
    state: "directory"
    mode:  "{{ compose_stack_dir_mode }}"

- name: "compose_stack ({{ compose_stack_name }}) | render compose.yml"
  ansible.builtin.template:
    src:  "{{ compose_stack_src_file }}"
    dest: "{{ compose_stack_dst_dir }}/compose.yml"
    mode: "{{ compose_stack_file_mode }}"
  notify: restart compose stack

- name: "compose_stack ({{ compose_stack_name }}) | start compose stack"
  community.docker.docker_compose_v2:
    project_src: "{{ compose_stack_dst_dir }}"
    state:       "present"

