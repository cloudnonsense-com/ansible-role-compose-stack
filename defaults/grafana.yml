---
### GRAFANA ###
compose_stack_grafana_image: "grafana/grafana-oss:11.5.1"
compose_stack_grafana_restart: "unless-stopped"
compose_stack_grafana_manage_ports: true
compose_stack_grafana_ports:
  - "37005:3000"
compose_stack_grafana_manage_labels: true
compose_stack_grafana_labels_traefik_enable: true
compose_stack_grafana_labels_traefik_pattern: "default"
compose_stack_grafana_labels_raw_enable: false
compose_stack_grafana_labels_raw: ""
compose_stack_grafana_manage_configs: false
compose_stack_grafana_configs: ""

### INFLUXDB ###
compose_stack_influxdb_image: "influxdb:1.8.3"
compose_stack_influxdb_restart: "unless-stopped"
compose_stack_influxdb_manage_ports: true
compose_stack_influxdb_ports:
  - "8086:8086"
compose_stack_influxdb_manage_labels: false
compose_stack_influxdb_manage_configs: false
