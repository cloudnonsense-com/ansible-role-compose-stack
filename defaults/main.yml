---
# defaults file for ansible-role-compose-stack
app: hello_world
apps_dst_dir: "/opt/apps"
app_dst_dir: "{{ apps_dst_dir }}/{{ app }}"

# compose_file: "files/compose.yml"
compose_src_file: >-
  {% if app == "hello_world" %}
  files/compose.yml
  {% else %}
  apps/{{ app }}/compose.yml
  {% endif %}
