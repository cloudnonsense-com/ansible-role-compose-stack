---
# defaults file for ansible-role-compose-stack
compose_stack_name: "nginx-demo"        # compose_stack_name: "nginx-demo"
compose_stacks_base_dir: "/opt/apps"
compose_stack_copy_data: true
compose_stack_state: "present"
# compose_stack_keep_files_on_destroy: true|false # future improvement
# future debug features
# compose_stack_debug: false # not used yet
# compose_stack_no_log: true # not used yet
compose_stack_file_owner: root
compose_stack_http_host: "nginx-demo.example.lan"

# compiled vars (maybe move these to vars/main.yml)
compose_stack_src_file: "{{ 'templates/compose.yml.j2' if compose_stack_name == 'nginx-demo' else 'apps/' ~ compose_stack_name ~ '/compose.yml.j2' }}"
compose_stack_src_data: "{{ 'files/data'               if compose_stack_name == 'nginx-demo' else 'apps/' ~ compose_stack_name ~ '/data'           }}"
compose_stack_dst_dir:  "{{ compose_stacks_base_dir }}/{{ compose_stack_name }}"
compose_stack_dst_data: "{{ compose_stack_dst_dir }}/data"
...